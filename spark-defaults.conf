# Defaults picked up by every SparkSession built in the driver (spark-jupyter).
# Keep notebooks free of infrastructure config — they should only set .appName().
#
# Sizing rationale (8 GB laptop, two 1 GB workers, 900 MB SPARK_WORKER_MEMORY):
#   executor heap (500m) + memoryOverhead (300m) = 800 MB
#   fits under the 900 MB worker budget and the 1 GB container mem_limit with
#   ~100 MB headroom. Earlier 800m heap + default 384m overhead = ~1.2 GB → OOM-kill.
# Shuffle partitions: 8 matches our 2 cores × ~4 = small, so skew/spill shows up
#   pedagogically rather than being masked by over-parallelization.

spark.master                      spark://spark-master:7077
spark.executor.memory             500m
spark.executor.memoryOverhead     300m
spark.executor.cores              1
spark.driver.memory               1g
spark.sql.shuffle.partitions      8

# Parallelism floor of 1: one partition per file by default. Avoids the row-group
# midpoint gotcha where Spark splits a single-row-group parquet file into 2 byte
# ranges and one task ends up processing zero records. Students should get clean
# one-file-per-task mapping on the small tier to build intuition.
spark.sql.files.minPartitionNum   1

# AQE off for teaching. AQE's job-splitting at each Exchange produces extra "SKIPPED"
# stages in the UI that are genuinely confusing for beginners trying to learn the
# job/stage/task hierarchy. Lessons on skew (04-exercise-d, instructor-skew-demo)
# already rely on AQE being off to show raw partition imbalance.
spark.sql.adaptive.enabled        false
 
 # S3 / MinIO Configuration
 spark.jars.packages               org.apache.hadoop:hadoop-aws:3.3.4
 spark.hadoop.fs.s3a.endpoint      http://spark-minio:9000
 spark.hadoop.fs.s3a.access.key    minioadmin
 spark.hadoop.fs.s3a.secret.key    minioadmin
 spark.hadoop.fs.s3a.path.style.access true
 spark.hadoop.fs.s3a.impl          org.apache.hadoop.fs.s3a.S3AFileSystem
 spark.hadoop.fs.s3a.connection.ssl.enabled false
